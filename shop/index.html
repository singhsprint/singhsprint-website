<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drops · Singhs Print</title>
  <meta name="description" content="Limited drops by Singhs Print. Designed, printed, and shipped from Montréal.">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/images/favicon-180.png">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Drops · Singhs Print">
  <meta property="og:description" content="Limited drops by Singhs Print. Designed, printed, and shipped from Montréal.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,sans-serif;color:#1a1a1a;background:#fafafa;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
    img{max-width:100%;height:auto;display:block}
    a{text-decoration:none;color:inherit}

    .topbar{background:#0a0a0a;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
    .topbar a{font-weight:600;font-size:.95rem}
    .topbar .left{display:flex;gap:24px;align-items:center}
    .topbar .brand{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:800;letter-spacing:-.5px}

    .hero{padding:80px 24px 56px;text-align:center;border-bottom:1px solid #eee;background:#fff}
    .hero .label{display:inline-block;font-size:.8rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;margin-bottom:16px}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,5vw,4rem);font-weight:800;line-height:1.1;margin-bottom:16px}
    .hero p{font-size:1.15rem;color:#555;max-width:560px;margin:0 auto}

    .wrap{max-width:1200px;margin:0 auto;padding:48px 24px 96px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:32px}

    .card{display:block;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .25s}
    .card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.08)}
    .card .media{aspect-ratio:1/1;background:#f0f0f0;overflow:hidden}
    .card .media img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
    .card:hover .media img{transform:scale(1.04)}
    .card .body{padding:20px}
    .card h3{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;margin-bottom:6px}
    .card .price{font-size:1rem;font-weight:600;color:#1a1a1a}

    .empty{text-align:center;padding:80px 24px;color:#666}
    .empty h2{font-family:'Playfair Display',serif;font-size:1.75rem;margin-bottom:8px;color:#1a1a1a}

    .loading{text-align:center;padding:80px 24px;color:#888;font-size:.95rem}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="left">
      <a class="brand" href="/">Singhs Print</a>
      <a href="/shop">Drops</a>
    </div>
    <a href="/">Back to site →</a>
  </div>

  <section class="hero">
    <div class="label">Singhs Print · Limited Drops</div>
    <h1>Drops</h1>
    <p>Designed, printed, and shipped from Montréal. One run per drop. When it's gone, it's gone.</p>
  </section>

  <main class="wrap">
    <div id="status" class="loading">Loading drops…</div>
    <div id="grid" class="grid" style="display:none"></div>
  </main>

  <footer style="border-top:1px solid #e8e8e8;background:#fff;padding:32px 24px;text-align:center;font-size:.85rem;color:#666;margin-top:48px">
    <div>
      <a href="/shop/policies" style="color:#1a1a1a;font-weight:500;margin-right:18px">Shipping &amp; refund policy</a>
      <a href="mailto:hello@singhsprint.com" style="color:#1a1a1a;font-weight:500;margin-right:18px">hello@singhsprint.com</a>
      <a href="tel:+15149151539" style="color:#1a1a1a;font-weight:500">+1 (514) 915-1539</a>
    </div>
    <div style="margin-top:8px;color:#999">Designed, printed, and shipped from Montréal.</div>
  </footer>

  <script>
    (async function() {
      const statusEl = document.getElementById('status');
      const gridEl = document.getElementById('grid');
      try {
        const resp = await fetch('/api/shop/list');
        const json = await resp.json();
        const drops = json.drops || [];
        if (drops.length === 0) {
          statusEl.outerHTML = '<div class="empty"><h2>No drops live right now.</h2><p>Check back soon.</p></div>';
          return;
        }
        gridEl.innerHTML = drops.map(d => `
          <a class="card" href="/shop/${encodeURIComponent(d.slug)}">
            <div class="media"><img src="${d.mockup_url}" alt="${(d.title||'').replace(/"/g,'&quot;')}"></div>
            <div class="body">
              <h3>${(d.title||'').replace(/</g,'&lt;')}</h3>
              <div class="price">$${(d.retail_price_cents/100).toFixed(2)} ${d.currency || 'CAD'}</div>
            </div>
          </a>
        `).join('');
        statusEl.style.display = 'none';
        gridEl.style.display = 'grid';
      } catch (e) {
        statusEl.textContent = 'Could not load drops. Please refresh.';
      }
    })();
  </script>
</body>
</html>
